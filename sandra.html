<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Sandra</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#F6EEE9">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,450;0,9..144,560;0,9..144,650;1,9..144,500&family=Instrument+Sans:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F6EEE9;
  --paper-2:#EFE1D8;
  --ink:#201A18;
  --ink-soft:rgba(32,26,24,.66);
  --wine:#7A1F2B;
  --line:rgba(32,26,24,.16);
}
*{box-sizing:border-box;}
html,body{
  margin:0;padding:0;
  background:radial-gradient(ellipse at top, var(--paper-2), var(--paper) 62%);
  color:var(--ink);
  font-family:'Instrument Sans',sans-serif;
  height:100vh;height:100dvh;
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
}
button,input{font:inherit;color:inherit;}
button{background:none;border:none;cursor:pointer;padding:0;}
h1,p{margin:0;}
button:focus-visible,input:focus-visible{outline:2px solid var(--wine);outline-offset:3px;}

.chrome-top{
  position:fixed;top:0;left:0;right:0;
  display:flex;justify-content:space-between;align-items:center;
  padding:20px 24px;
  z-index:20;
  pointer-events:none;
}
.mark{
  width:32px;height:32px;
  border:1px solid var(--ink);
  border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Space Mono',monospace;
  font-size:12px;font-weight:700;
}
.stamp{
  font-family:'Space Mono',monospace;
  font-size:10px;font-weight:700;
  letter-spacing:.14em;
  color:var(--wine);
  border:1px solid var(--wine);
  padding:5px 10px;
  border-radius:2px;
  transform:rotate(-2deg);
  text-transform:uppercase;
}

.screen{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
.screen[hidden]{display:none;}

#gate .gate-card{width:min(88vw,420px);text-align:center;padding:0 20px;}
.lock-icon{color:var(--ink);margin-bottom:18px;}
.eyebrow{
  font-family:'Space Mono',monospace;
  font-size:11px;font-weight:700;
  letter-spacing:.14em;
  color:var(--wine);
  text-transform:uppercase;
  margin-bottom:14px;
}
.headline{
  font-family:'Fraunces',serif;
  font-weight:560;
  font-size:clamp(1.7rem,5vw,2.4rem);
  line-height:1.08;
  letter-spacing:-.01em;
  margin-bottom:14px;
}
.body-copy{font-size:1rem;line-height:1.6;color:var(--ink-soft);}
.gate-card .body-copy{margin-bottom:28px;}

#gateForm{display:flex;flex-direction:column;gap:14px;}
#pwInput{
  width:100%;padding:12px 4px;
  background:transparent;border:none;
  border-bottom:1.5px solid var(--ink);
  font-size:1.05rem;text-align:center;letter-spacing:.04em;
}
#pwInput::placeholder{color:var(--ink-soft);}
.primary-btn{
  width:100%;padding:14px 20px;
  background:var(--ink);color:var(--paper);
  border-radius:4px;font-weight:600;font-size:.95rem;
  transition:transform .15s ease,background .15s ease;
}
.primary-btn:hover{background:var(--wine);}
.primary-btn:active{transform:scale(.98);}
.primary-btn:disabled{opacity:.6;cursor:default;}
.gate-error{color:var(--wine);font-size:.88rem;margin-top:14px;min-height:1em;}
.gate-error[hidden]{display:none;}

@keyframes shake{
  10%,90%{transform:translateX(-1px);}
  20%,80%{transform:translateX(2px);}
  30%,50%,70%{transform:translateX(-5px);}
  40%,60%{transform:translateX(5px);}
}
.shake{animation:shake .5s;}

#deck{flex-direction:column;padding:0;}
#slideContainer{
  flex:1;width:100%;
  display:flex;align-items:center;justify-content:center;
  padding:100px 24px 110px;
  overflow-y:auto;
}
.slide{width:100%;max-width:720px;opacity:0;transform:translateY(10px);transition:opacity .45s ease,transform .45s ease;}
.slide.in{opacity:1;transform:translateY(0);}
.slide-content{text-align:center;}
.intro .headline,.outro .headline{font-size:clamp(2rem,6vw,3.1rem);}
.intro .body-copy,.outro .body-copy{max-width:480px;margin:0 auto 32px;}
.footer-line{font-family:'Fraunces',serif;font-style:italic;font-size:1rem;color:var(--ink-soft);margin-bottom:28px;}
.cta-btn{padding:15px 34px;background:var(--wine);color:var(--paper);border-radius:4px;font-weight:600;transition:transform .15s ease;}
.cta-btn:hover{transform:translateY(-2px);}
.link-btn{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);text-decoration:underline;text-underline-offset:4px;}

.context{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:22px;}
.matchup{position:relative;display:flex;gap:20px;align-items:stretch;}
.option{
  flex:1;padding:44px 20px;
  border:1.5px solid var(--line);border-radius:8px;
  font-family:'Fraunces',serif;font-weight:500;font-style:italic;
  font-size:clamp(1.2rem,3.4vw,1.6rem);line-height:1.25;
  transition:background .2s ease,color .2s ease,border-color .2s ease,transform .15s ease;
}
.option:hover{border-color:var(--ink);}
.option.selected{background:var(--wine);border-color:var(--wine);color:var(--paper);transform:scale(1.02);}
.or-badge{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:38px;height:38px;background:var(--paper);
  border:1.5px solid var(--ink);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:'Space Mono',monospace;font-size:10px;font-weight:700;letter-spacing:.06em;
  z-index:5;
}

.deck-nav{position:fixed;bottom:26px;left:0;right:0;display:flex;align-items:center;justify-content:center;gap:28px;z-index:20;}
.deck-nav[hidden]{display:none;}
.nav-btn{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:10px 4px;}
.nav-btn:disabled{opacity:.3;cursor:default;}
.slide-count{font-family:'Space Mono',monospace;font-size:11px;color:var(--ink-soft);letter-spacing:.06em;}

#progressRail{position:fixed;bottom:0;left:0;right:0;height:3px;background:var(--line);z-index:21;}
#progressRail[hidden]{display:none;}
#progressFill{height:100%;background:var(--wine);width:0%;transition:width .4s ease;}

@media (max-width:640px){
  .matchup{flex-direction:column;gap:16px;}
  .option{padding:34px 18px;}
  #slideContainer{padding:90px 20px 120px;}
}
@media (prefers-reduced-motion:reduce){
  *{transition:none !important;animation:none !important;}
}
</style>
</head>
<body>

<div class="chrome-top">
  <div class="mark">JI</div>
  <div class="stamp">Confidential</div>
</div>

<main id="gate" class="screen">
  <div class="gate-card">
    <svg class="lock-icon" width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="11" width="16" height="10" rx="2"></rect><path d="M8 11V7a4 4 0 0 1 8 0v4"></path></svg>
    <div class="eyebrow">Confidential Deck</div>
    <h1 class="headline">This deck is locked.</h1>
    <p class="body-copy">Ask Jamiu for the password.</p>
    <form id="gateForm">
      <input type="password" id="pwInput" placeholder="Password" autocomplete="off" autocapitalize="off" autofocus required>
      <button type="submit" class="primary-btn" id="unlockBtn">Unlock Deck</button>
    </form>
    <p class="gate-error" id="gateError" hidden aria-live="polite"></p>
  </div>
</main>

<main id="deck" class="screen" hidden>
  <div id="slideContainer"></div>
  <nav class="deck-nav" id="deckNav" hidden>
    <button class="nav-btn" id="prevBtn" type="button">Back</button>
    <div class="slide-count" id="slideCount"></div>
    <button class="nav-btn" id="nextBtn" type="button">Next</button>
  </nav>
</main>

<div id="progressRail" hidden><div id="progressFill"></div></div>

<script>
(function(){
  // ---- Encrypted deck content. Regenerate via change-password.html, don't hand-edit. ----
  var LOCKED = {
    salt: "nay6njDv+Tk1Y/U7iXk8/g==",
    iv: "cfhIJu7t73qpA09m",
    data: "qZpnFwADNAmnS4dOXxeml72zsXj7loBUs9j4b85Wz/bfa9IqaQMfG+2ve7UvqvEU9s4cf8HWGSWd5RDSJLljRZJRdlcJ8ETpIn8W813Sw58sz3LaBqWFIX8er2ZQBPCWynDtTFKrSU5iSiQckZy6+uIEXhcvRC9VTdgJ2x0NLJefdF2Jc2oWL6q+jCl0+ixyCkssRvEoORleZcHHCKowhD2KeZuxmIaawhHgSFiMbYezWdreBO0mZiNYKhJqrV9sZkYwXOdHXGMjueTCeKk8yW4V7r34WxqYbkvLv5ujeqlqHXsovELfXerkWjChbxHPtTTKGxSARHOeeMHyz514oCdrI52quKQtyfyKhmEmtW46rkFdch670jqC7n3rHelyaJA5dN357TtW2qKZEKVpMLP3Fe52zRI51kH+Nv6gTed/oy0af+B398aB+LpOJBucaX1fYlSTe/4W9WkcwwbueJEf6V9tR41/offhTwrIl8U+AXkgAQYES/C1z72Vr1GhNx5wLxkS7jYHddiIjaxXP1vS8aBOM//2c8WuSJE1kxkXKXEEP9Ckq/P1SuisUb6Pzg9T63hi9sKU9zqDGElQoJeayKwFowzY8qy+vkXtCKzx5XwHGqvDeT5UOtGto/HN6B9h6Y6S6JVQWb7VNUYQmVXZntp0FI/qT4TYM+Q1zD3FIDwbKFKWMwxEm1JA0Bq7MD3ZhlW4m8wVgm9AHH5Z0xXCtUgbXhPSjm/nh+uFT8YwO5zgs77RQ+Jhkk4vw3MS7mzvY9T4xgFyZKaDLw3VT4By3DYEG2rQYqfZwIAT8Wh/bGPh+e9BIg2z/sx4ViwKPXWpt42fgIygMKEdMfF9LffjuXdH2WgOliFY90Qd1w9N9WnIOluDzxO2RxN0J+eX00jvccpamgBEIh083xF/K941ocR1jM87Au0s3ewAiHJZmMzsqY3RYRD3T7IMBDVmoGmOt6j9z9+ZU9srpSbZLbm/9QUOaaJGP+kl005qwgh+SbXRHSew9nF6jyusm8bsibAxdKiOGdOFJ6QhAG81lZEz68LyI7eNh2I3RFRzYgIw8L8hZnZE3dfBpR/TsK+TFcsRwkOshTvVd7ox3DVqIJMS2yevclgP5DXuN671ulOkzVo2ktLVbI5XUwt7Ra9gggwlMh0KQjfaEHsdlb7HPEk="
  };
  var ITERATIONS = 250000;
  var textEnc = new TextEncoder();
  var textDec = new TextDecoder();

  function b64ToBytes(str){
    var bin = atob(str);
    var bytes = new Uint8Array(bin.length);
    for(var i=0;i<bin.length;i++) bytes[i] = bin.charCodeAt(i);
    return bytes;
  }

  // ---- Password -> key -> decrypt. Must match change-password.html exactly. ----
  function deriveKey(password, saltBytes){
    return crypto.subtle.importKey('raw', textEnc.encode(password), {name:'PBKDF2'}, false, ['deriveKey'])
      .then(function(keyMaterial){
        return crypto.subtle.deriveKey(
          {name:'PBKDF2', salt: saltBytes, iterations: ITERATIONS, hash:'SHA-256'},
          keyMaterial,
          {name:'AES-GCM', length:256},
          false,
          ['decrypt']
        );
      });
  }

  function decryptContent(password){
    var salt = b64ToBytes(LOCKED.salt);
    var iv = b64ToBytes(LOCKED.iv);
    var data = b64ToBytes(LOCKED.data);
    return deriveKey(password, salt).then(function(key){
      return crypto.subtle.decrypt({name:'AES-GCM', iv: iv}, key, data);
    }).then(function(plainBuf){
      return textDec.decode(plainBuf);
    });
  }

  // ---- App state ----
  var DECK = null, current = 0, total = 0;
  var selections = {};

  var gateEl = document.getElementById('gate');
  var deckEl = document.getElementById('deck');
  var slideContainer = document.getElementById('slideContainer');
  var deckNav = document.getElementById('deckNav');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');
  var slideCountEl = document.getElementById('slideCount');
  var progressRail = document.getElementById('progressRail');
  var progressFill = document.getElementById('progressFill');
  var gateForm = document.getElementById('gateForm');
  var pwInput = document.getElementById('pwInput');
  var gateError = document.getElementById('gateError');
  var unlockBtn = document.getElementById('unlockBtn');

  gateForm.addEventListener('submit', function(e){
    e.preventDefault();
    gateError.hidden = true;

    if (!window.crypto || !window.crypto.subtle) {
      gateError.textContent = 'This connection blocked a secure feature (needs HTTPS). Try a different browser.';
      gateError.hidden = false;
      return;
    }

    unlockBtn.disabled = true;
    unlockBtn.textContent = 'Checking…';

    decryptContent(pwInput.value).then(function(json){
      DECK = JSON.parse(json);
      total = DECK.slides.length;
      enterDeck();
    }).catch(function(){
      gateError.textContent = "That's not it — try again.";
      gateError.hidden = false;
      gateEl.classList.remove('shake');
      void gateEl.offsetWidth;
      gateEl.classList.add('shake');
      unlockBtn.disabled = false;
      unlockBtn.textContent = 'Unlock Deck';
      pwInput.select();
    });
  });

  function enterDeck(){
    gateEl.hidden = true;
    deckEl.hidden = false;
    progressRail.hidden = false;
    current = 0;
    renderSlide();
  }

  function totalSteps(){ return total + 2; }

  // ---- Slide building & navigation ----
  function el(tag, className, text){
    var e = document.createElement(tag);
    if (className) e.className = className;
    if (text !== undefined) e.textContent = text;
    return e;
  }

  function buildIntro(){
    var wrap = el('div','slide-content intro');
    wrap.appendChild(el('div','eyebrow', DECK.intro.eyebrow));
    wrap.appendChild(el('h1','headline', DECK.intro.title));
    wrap.appendChild(el('p','body-copy', DECK.intro.body));
    var btn = el('button','cta-btn', DECK.intro.cta);
    btn.type = 'button';
    btn.addEventListener('click', goNext);
    wrap.appendChild(btn);
    return wrap;
  }

  function buildOutro(){
    var wrap = el('div','slide-content outro');
    wrap.appendChild(el('div','eyebrow', DECK.outro.eyebrow));
    if (DECK.outro.title) wrap.appendChild(el('h1','headline', DECK.outro.title));
    if (DECK.outro.body) wrap.appendChild(el('p','body-copy', DECK.outro.body));
    wrap.appendChild(el('p','footer-line', DECK.outro.footer));
    var again = el('button','link-btn','Watch it again');
    again.type = 'button';
    again.addEventListener('click', function(){ current = 0; renderSlide(); });
    wrap.appendChild(again);
    return wrap;
  }

  function buildOption(text, idx, side){
    var btn = el('button','option', text);
    btn.type = 'button';
    if (selections[idx] === side) btn.classList.add('selected');
    btn.addEventListener('click', function(){
      selections[idx] = side;
      renderSlide();
    });
    return btn;
  }

  function buildQuestion(q, idx){
    var wrap = el('div','slide-content question');
    if (q.context) wrap.appendChild(el('div','context', q.context));
    var matchup = el('div','matchup');
    matchup.appendChild(buildOption(q.a, idx, 'a'));
    matchup.appendChild(el('div','or-badge','OR'));
    matchup.appendChild(buildOption(q.b, idx, 'b'));
    wrap.appendChild(matchup);
    return wrap;
  }

  function renderSlide(){
    slideContainer.innerHTML = '';
    var frag = el('div','slide');
    var last = totalSteps() - 1;

    if (current === 0){
      frag.appendChild(buildIntro());
      deckNav.hidden = true;
    } else if (current === last){
      frag.appendChild(buildOutro());
      deckNav.hidden = true;
    } else {
      var qIndex = current - 1;
      frag.appendChild(buildQuestion(DECK.slides[qIndex], qIndex));
      deckNav.hidden = false;
      slideCountEl.textContent = String(qIndex+1).padStart(2,'0') + ' / ' + String(total).padStart(2,'0');
    }

    slideContainer.appendChild(frag);
    requestAnimationFrame(function(){ frag.classList.add('in'); });

    var pct = current / last * 100;
    progressFill.style.width = pct + '%';
  }

  function goNext(){ var last = totalSteps()-1; if (current < last){ current++; renderSlide(); } }
  function goPrev(){ if (current > 0){ current--; renderSlide(); } }

  nextBtn.addEventListener('click', goNext);
  prevBtn.addEventListener('click', goPrev);

  document.addEventListener('keydown', function(e){
    if (deckEl.hidden) return;
    if (e.key === 'ArrowRight') goNext();
    if (e.key === 'ArrowLeft') goPrev();
  });

  var touchStartX = 0;
  slideContainer.addEventListener('touchstart', function(e){ touchStartX = e.touches[0].clientX; }, {passive:true});
  slideContainer.addEventListener('touchend', function(e){
    var dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 60){ if (dx < 0) goNext(); else goPrev(); }
  }, {passive:true});
})();
</script>
</body>
</html>
